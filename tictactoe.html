<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
body{
font-family: Arial;
text-align: center;
}

table{
margin:auto;
}

td{
width:80px;
height:80px;
border:2px solid black;
font-size:40px;
text-align:center;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Tic Tac Toe</h2>

<table>
<tr>
<td onclick="play(this)"></td>
<td onclick="play(this)"></td>
<td onclick="play(this)"></td>
</tr>

<tr>
<td onclick="play(this)"></td>
<td onclick="play(this)"></td>
<td onclick="play(this)"></td>
</tr>

<tr>
<td onclick="play(this)"></td>
<td onclick="play(this)"></td>
<td onclick="play(this)"></td>
</tr>
</table>

<script>

let turn="X"

function play(cell){

if(cell.innerHTML==""){

cell.innerHTML=turn

if(turn=="X"){
turn="O"
}
else{
turn="X"
}

}

}

</script>

</body>
</html>
